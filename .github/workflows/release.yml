name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - run: npm ci

      - name: Build Tauri app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Publish release & update latest.json
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          REPO="${GITHUB_REPOSITORY}"

          echo "=== Bundle output ==="
          find src-tauri/target/release/bundle -type f | sort

          BUNDLE_ZIP=$(find src-tauri/target/release/bundle/nsis -name "*.nsis.zip" 2>/dev/null | head -1 || true)
          if [ -z "$BUNDLE_ZIP" ]; then
            BUNDLE_ZIP=$(find src-tauri/target/release/bundle/msi -name "*.msi.zip" 2>/dev/null | head -1 || true)
          fi
          if [ -z "$BUNDLE_ZIP" ]; then
            echo "ERROR: No updater bundle (.nsis.zip / .msi.zip) found. Make sure TAURI_SIGNING_PRIVATE_KEY is set."
            exit 1
          fi
          SIG_FILE="${BUNDLE_ZIP}.sig"
          if [ ! -f "$SIG_FILE" ]; then
            echo "ERROR: Signature file not found: $SIG_FILE"
            exit 1
          fi

          INSTALLER=$(find src-tauri/target/release/bundle/nsis -name "*-setup.exe" 2>/dev/null | head -1 || true)
          if [ -z "$INSTALLER" ]; then
            INSTALLER=$(find src-tauri/target/release/bundle/msi -name "*.msi" 2>/dev/null | head -1 || true)
          fi
          if [ -z "$INSTALLER" ]; then
            echo "ERROR: No installer (.exe / .msi) found."
            exit 1
          fi

          ZIP_NAME=$(basename "$BUNDLE_ZIP")
          ASSET_URL="https://github.com/${REPO}/releases/download/${TAG}/${ZIP_NAME}"

          echo "INSTALLER: $INSTALLER"
          echo "BUNDLE_ZIP: $BUNDLE_ZIP"
          echo "SIG_FILE: $SIG_FILE"
          echo "ASSET_URL: $ASSET_URL"

          gh release create "$TAG" \
            --title "Checkpoint ${TAG}" \
            --generate-notes \
            "$INSTALLER" \
            "$BUNDLE_ZIP" \
            "$SIG_FILE"

          node -e "
            const fs = require('fs');
            const sig = fs.readFileSync(process.argv[1], 'utf8').trim();
            const json = {
              version: process.argv[2],
              notes: 'https://github.com/' + process.argv[3] + '/releases/tag/' + process.argv[4],
              pub_date: new Date().toISOString(),
              platforms: {
                'windows-x86_64': { signature: sig, url: process.argv[5] }
              }
            };
            fs.writeFileSync('latest.json', JSON.stringify(json, null, 2) + '\n');
          " "$SIG_FILE" "$VERSION" "$REPO" "$TAG" "$ASSET_URL"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest.json
          git commit -m "chore: update latest.json to ${TAG}"
          git push origin HEAD:main
