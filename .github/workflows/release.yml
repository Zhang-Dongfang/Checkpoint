name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - run: npm ci

      - name: Build Tauri app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Publish release & update latest.json
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          REPO="${GITHUB_REPOSITORY}"

          BUNDLE_ZIP=$(ls src-tauri/target/release/bundle/nsis/*.nsis.zip 2>/dev/null | head -1)
          if [ -z "$BUNDLE_ZIP" ]; then
            BUNDLE_ZIP=$(ls src-tauri/target/release/bundle/msi/*.msi.zip 2>/dev/null | head -1)
          fi
          SIG_FILE="${BUNDLE_ZIP}.sig"

          INSTALLER=$(ls src-tauri/target/release/bundle/nsis/*-setup.exe 2>/dev/null | head -1)
          if [ -z "$INSTALLER" ]; then
            INSTALLER=$(ls src-tauri/target/release/bundle/msi/*.msi 2>/dev/null | head -1)
          fi

          ZIP_NAME=$(basename "$BUNDLE_ZIP")
          ASSET_URL="https://github.com/${REPO}/releases/download/${TAG}/${ZIP_NAME}"

          gh release create "$TAG" \
            --title "Checkpoint ${TAG}" \
            --generate-notes \
            "$INSTALLER" \
            "$BUNDLE_ZIP"

          node -e "
            const fs = require('fs');
            const sig = fs.readFileSync(process.argv[1], 'utf8').trim();
            const json = {
              version: process.argv[2],
              notes: 'https://github.com/' + process.argv[3] + '/releases/tag/' + process.argv[4],
              pub_date: new Date().toISOString(),
              platforms: {
                'windows-x86_64': { signature: sig, url: process.argv[5] }
              }
            };
            fs.writeFileSync('latest.json', JSON.stringify(json, null, 2) + '\n');
          " "$SIG_FILE" "$VERSION" "$REPO" "$TAG" "$ASSET_URL"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest.json
          git commit -m "chore: update latest.json to ${TAG}"
          git push origin HEAD:main
