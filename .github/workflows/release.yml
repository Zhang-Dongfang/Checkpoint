name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - run: npm ci

      - name: Build Tauri app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Publish release & update latest.json
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_OWNER: ${{ secrets.GITEE_OWNER }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          REPO="${GITHUB_REPOSITORY}"
          GITEE_REPO="Checkpoint"

          echo "=== Bundle output ==="
          find src-tauri/target/release/bundle -type f | sort

          # Tauri v2 signs installers directly — no .zip, just .exe.sig / .msi.sig
          INSTALLER=$(find src-tauri/target/release/bundle/nsis -name "*-setup.exe" 2>/dev/null | head -1 || true)
          if [ -z "$INSTALLER" ]; then
            INSTALLER=$(find src-tauri/target/release/bundle/msi -name "*.msi" 2>/dev/null | head -1 || true)
          fi
          if [ -z "$INSTALLER" ]; then
            echo "ERROR: No installer (.exe / .msi) found."
            exit 1
          fi
          SIG_FILE="${INSTALLER}.sig"
          if [ ! -f "$SIG_FILE" ]; then
            echo "ERROR: Signature file not found: $SIG_FILE"
            echo "Make sure TAURI_SIGNING_PRIVATE_KEY secret is set."
            exit 1
          fi

          INSTALLER_NAME=$(basename "$INSTALLER")

          # ── 1. GitHub release ──────────────────────────────────────────────
          gh release create "$TAG" \
            --title "Checkpoint ${TAG}" \
            --generate-notes \
            "$INSTALLER" \
            "$SIG_FILE"

          # ── 2. Gitee release ───────────────────────────────────────────────
          # 先把 tag 推到 Gitee（mirror workflow 只同步 main，不同步 tag）
          git remote add gitee "https://${GITEE_OWNER}:${GITEE_TOKEN}@gitee.com/${GITEE_OWNER}/${GITEE_REPO}.git"
          git push gitee HEAD:main --force
          git push gitee "$TAG" --force

          GITEE_API="https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}/releases"

          GITEE_RESP=$(curl -s -X POST "${GITEE_API}?access_token=${GITEE_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"${TAG}\",\"name\":\"Checkpoint ${TAG}\",\"body\":\"Release ${TAG}\",\"target_commitish\":\"main\"}")
          echo "Gitee API response: $GITEE_RESP"

          RELEASE_ID=$(echo "$GITEE_RESP" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{ try{ console.log(JSON.parse(d).id) }catch(e){ console.log('parse_error') } })")

          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ] || [ "$RELEASE_ID" = "parse_error" ]; then
            echo "ERROR: Failed to create Gitee release (id=$RELEASE_ID)"
            exit 1
          fi
          echo "Gitee release ID: $RELEASE_ID"

          curl -s -X POST "https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}/releases/${RELEASE_ID}/attach_files?access_token=${GITEE_TOKEN}" \
            -F "file=@${INSTALLER}"

          # Gitee download URL
          ASSET_URL="https://gitee.com/${GITEE_OWNER}/${GITEE_REPO}/releases/download/${TAG}/${INSTALLER_NAME}"

          echo "INSTALLER: $INSTALLER"
          echo "SIG_FILE: $SIG_FILE"
          echo "ASSET_URL (Gitee): $ASSET_URL"

          # ── 3. Update latest.json ──────────────────────────────────────────
          node -e "
            const fs = require('fs');
            const sig = fs.readFileSync(process.argv[1], 'utf8').trim();
            const json = {
              version: process.argv[2],
              notes: 'https://github.com/' + process.argv[3] + '/releases/tag/' + process.argv[4],
              pub_date: new Date().toISOString(),
              platforms: {
                'windows-x86_64': { signature: sig, url: process.argv[5] }
              }
            };
            fs.writeFileSync('latest.json', JSON.stringify(json, null, 2) + '\n');
          " "$SIG_FILE" "$VERSION" "$REPO" "$TAG" "$ASSET_URL"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest.json
          git commit -m "chore: update latest.json to ${TAG}"
          git push origin HEAD:main
